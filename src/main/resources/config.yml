# ╔════════════════════════════════════════════╗
# ║           MapArtCopyright Config          ║
# ║      Customize map art protection & UI    ║
# ╚════════════════════════════════════════════╝


database:
  type: h2  # mysql, sqlite, or h2

mysql:
  enabled: false
  host: localhost
  port: 3306
  database: mapart
  username: root
  password: ""
  useSSL: false
  allowPublicKeyRetrieval: true

settings:
  default-lock-enabled: true         # Should maps be locked when /mapart lock is used
  default-hologram-visible: true     # Show creator hologram under item frame by default
  require-display-name: false        # Force display names on all locked maps

gui:
  title: "§8MapArt Manager"          # Title for the GUI menu
  filler-item: GRAY_STAINED_GLASS_PANE
  exit-item: BARRIER

messages:
  no-permission: "§cYou don't have permission to do that."
  only-players: "§cOnly players can use this command."
  map-required: "§cHold a filled map in your hand to do this."
  locked: "§aMap locked successfully."
  unlocked: "§aMap unlocked successfully."
  renamed: "§aMap renamed to: §f{input}"
  credited: "§aCreator set to: §f{input}"
  toggled-displayname-on: "§aMap name shown."
  toggled-displayname-off: "§7Map name hidden."
  toggled-hologram-on: "§aCreator tag shown."
  toggled-hologram-off: "§7Creator tag hidden."

  
  economy:
    enabled: true
    lock-cost: 100.0
    unlock-cost: 50.0

metrics:
  plugin-id: 0  # Set to your bStats plugin ID from https://bstats.org (0 = disabled)

# Optional future features
features:
  enable-permissions: true
  enable-map-lore-updates: true
  enable-gui: true

  