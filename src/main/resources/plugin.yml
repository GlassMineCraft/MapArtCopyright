name: MapArtCopyright
version: 1.0.0
main: net.glassmc.mapartcopyright.MapArtCopyright
api-version: 1.21
author: GlassMC
description: Adds copyright, naming, and locking features for map art


depend: [Vault, CMILib]


commands:
  mapart:
    description: Manage map art copyright
    usage: /mapart <subcommand>
    permission: mapart.use

permissions:
  mapart.use:
    description: Use the /mapart command
    default: true

  mapart.lock:
    description: Allows locking maps
    default: op

  mapart.unlock:
    description: Allows unlocking maps
    default: op

  mapart.credit:
    description: Allows setting map creator credit
    default: true

  mapart.rename:
    description: Allows renaming maps
    default: op

  mapart.menu:
    description: Allows opening and interacting with the map menu
    default: true

  mapart.toggle.displayname:
    description: Toggle map name visibility in GUI
    default: true

  mapart.toggle.hologram:
    description: Toggle creator hologram in GUI
    default: true

  mapart.toggle.itemframe:
    description: Toggle item frame locking in GUI
    default: true

mapart.bypass:
  description: Allows bypassing map ownership restrictions
  default: op

mapart.info:
  description: Allows viewing UUID and metadata of a map
  default: op

  mapart.audit:
    description: View audit logs for a specific map
    default: op

mapart.verify:
  description: Allows players to verify their own map art
  default: true

mapart.verify.others:
  description: Allows admins to verify other players' map art
  default: op
  
mapart.*:
  description: Grants access to all MapArtCopyright features
  default: op
  children:
    mapart.use: true
    mapart.lock: true
    mapart.unlock: true
    mapart.credit: true
    mapart.rename: true
    mapart.menu: true
      mapart.toggle.displayname: true
      mapart.toggle.hologram: true
      mapart.toggle.itemframe: true
      mapart.bypass: true
      mapart.info: true
      mapart.audit: true
